<header class="nav-bar" x-data="{ openNav: false }">
  <div class="container">

    <div class="navbar-buttons">
      <a href="{{ site.baseurl }}/" class="navbar-home is-2">
        <figure class="image navbar-logo is-1">
          <img src="/assets/images/ADEFS.svg" alt="Logo {{ site.title }}">
        </figure>
        <h1 class="nav-text">{{ site.title }}</h1>
      </a>

      <a
        role="button"
        class="navbar-burger burger"
        aria-label="menu"
        aria-expanded="false"
        data-target="navMenu"
        :class="{ 'is-active': openNav }"
        x-on:click="openNav = !openNav"
      >
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
      </a>
    </div>

    <div
      class="navbar-menu"
      id="navMenu"
      :class="{ 'is-active': openNav }"
    >
      <div class="navbar-start">

        <a
          href="{{ site.baseurl }}/"
          class="navbar-item {% if page.url == '/' %}is-active{% endif %}"
        >
          Início
        </a>

        {% if site.data.navbar %}
          {% for item in site.data.navbar-items %}

            {% if item.dropdown %}
              <div
                class="navbar-item has-dropdown is-hoverable
                       {% if site.fixed_navbar == 'bottom' %}has-dropdown-up{% endif %}"
              >
                <a
                  href="{{ item.link | relative_url }}"
                  class="navbar-link {% if page.url contains item.link %}is-active{% endif %}"
                >
                  <h1 class="nav-text">{{ item.name }}</h1>
                </a>

                <div class="navbar-dropdown">
                  {% for subitem in item.dropdown %}
                    <a
                      href="{{ subitem.link | relative_url }}"
                      class="navbar-item {% if subitem.link == page.url %}is-active{% endif %}"
                    >
                      <h1 class="nav-text">{{ subitem.name }}</h1>
                    </a>
                  {% endfor %}
                </div>
              </div>

            {% else %}

              <a
                href="{{ item.link | relative_url }}"
                class="navbar-item {% if item.link == page.url %}is-active{% endif %}"
              >
                {{ item.name }}
              </a>

            {% endif %}

          {% endfor %}
        {% endif %}

      </div>
    </div>

  </div>
</header>
